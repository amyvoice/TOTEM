name: Build ZMK Firmware

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: app

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip3 install west
          sudo apt-get update
          sudo apt-get install -y \
            gcc-multilib \
            libnewlib-arm-none-eabi \
            ccache \
            device-tree-compiler

      - name: West Init & Update
        run: |
          cd app
          west init -l config
          west update

      - name: West Zephyr Export
        run: |
          cd app
          west zephyr-export

      # ====== 调试：列出所有可用板子 ======
      - name: List available boards
        run: |
          cd app
          west boards 2>/dev/null || \
          find zephyr/boards/ -name "*.yaml" -o -name "*.yml" | head -50
          find zephyr/ -path "*/boards/*xiao*" 2>/dev/null
          find zephyr/ -path "*/boards/*seeed*" 2>/dev/null
      # ====================================

      - name: Build left shield
        run: |
          cd app
          west build --board seeeduino_xiao_ble \
            --shield totem_left \
            -s zmk/app

      - name: Build right shield
        run: |
          cd app
          west build --board seeeduino_xiao_ble \
            --shield totem_right \
            -s zmk/app

      - name: Export uf2 files
        run: |
          cp app/build/totem_left/zephyr/zmk.uf2 totem_left.uf2
          cp app/build/totem_right/zephyr/zmk.uf2 totem_right.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ZMK-Firmware
          path: |
            totem_left.uf2
            totem_right.uf2
