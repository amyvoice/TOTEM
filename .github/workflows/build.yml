name: Build ZMK Firmware

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          pip3 install west
          sudo apt-get update
          sudo apt-get install -y \
            gcc-multilib \
            libnewlib-arm-none-eabi \
            ccache \
            device-tree-compiler

      - name: West Init & Update
        run: |
          west init -l .
          west update

      - name: West Zephyr Export
        run: |
          west zephyr-export

      - name: Create shield symlink
        run: |
          mkdir -p zmk/shields
          ln -sf "$(pwd)/config/shields/totem_left" zmk/shields/totem_left
          ln -sf "$(pwd)/config/shields/totem_right" zmk/shields/totem_right
          echo "Symlinks:"
          ls -la zmk/shields/

      - name: Build left
        run: |
          west build --board xiao_ble//zmk \
            --shield totem_left \
            -s zmk \
            -- -DCONFIG_ZMK_STUDIO=y

      - name: Build right
        run: |
          west build --board xiao_ble//zmk \
            --shield totem_right \
            -s zmk \
            -- -DCONFIG_ZMK_STUDIO=y

      - name: Export uf2
        run: |
          mkdir -p firmware
          cp zmk/build/zephyr/zmk.uf2 firmware/totem_left.uf2 2>/dev/null || \
            cp build/zephyr/zmk.uf2 firmware/totem_left.uf2 2>/dev/null || \
            echo "Left build not found"
          cp zmk/build/zephyr/zmk.uf2 firmware/totem_right.uf2 2>/dev/null || \
            cp build/zephyr/zmk.uf2 firmware/totem_right.uf2 2>/dev/null || \
            echo "Right build not found"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ZMK-Firmware
          path: firmware/*.uf2
