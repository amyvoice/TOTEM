name: Build ZMK Firmware

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: app

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip3 install west
          sudo apt-get update
          sudo apt-get install -y \
            gcc-multilib \
            libnewlib-arm-none-eabi \
            ccache \
            device-tree-compiler

      - name: West Init & Update
        run: |
          cd app
          west init -l config
          west update

      - name: West Zephyr Export
        run: |
          cd app
          west zephyr-export

      - name: Create shield symlink
        run: |
          cd app/zmk/app
          mkdir -p shields
          ln -sf "$(pwd)/../../../../config/shields/totem_left" shields/totem_left
          ln -sf "$(pwd)/../../../../config/shields/totem_right" shields/totem_right
          ls -la shields/

      - name: Build left shield
        run: |
          cd app
          west build --board xiao_ble//zmk \
            --shield totem_left \
            -s zmk/app \
            -- -DCONFIG_ZMK_STUDIO=y

      - name: Build right shield
        run: |
          cd app
          west build --board xiao_ble//zmk \
            --shield totem_right \
            -s zmk/app \
            -- -DCONFIG_ZMK_STUDIO=y

      - name: Export uf2 files
        run: |
          mkdir -p firmware
          cp app/build/totem_left/zephyr/zmk.uf2 firmware/totem_left.uf2
          cp app/build/totem_right/zephyr/zmk.uf2 firmware/totem_right.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ZMK-Firmware
          path: |
            firmware/*.uf2
